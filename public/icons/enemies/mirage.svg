<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Dome/antenna -->
    <line x1="32" y1="10" x2="32" y2="22" stroke="#00FF88" stroke-width="2" stroke-linecap="round"/>
    <circle cx="32" cy="8" r="3" fill="none" stroke="#00FF88" stroke-width="2"/>
    <!-- Saucer dome -->
    <path d="M20,30 Q32,16 44,30" fill="none" stroke="#00FF88" stroke-width="2.5"/>
    <!-- Saucer body -->
    <ellipse cx="32" cy="34" rx="24" ry="8" fill="none" stroke="#00FF88" stroke-width="2.5"/>
    <!-- Center eye -->
    <circle cx="32" cy="34" r="4" fill="#00FF88" opacity="0.6"/>
    <!-- Bottom beam lines -->
    <line x1="22" y1="42" x2="18" y2="54" stroke="#00FF88" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="32" y1="42" x2="32" y2="56" stroke="#00FF88" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="42" y1="42" x2="46" y2="54" stroke="#00FF88" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>
</svg>