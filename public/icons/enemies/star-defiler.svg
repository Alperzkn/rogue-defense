<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Outer triangle -->
    <polygon points="32,6 56,54 8,54" fill="none" stroke="#B44FFF" stroke-width="3" stroke-linejoin="round"/>
    <!-- Spiral/swirl pattern inside -->
    <path d="M32,18 Q42,28 36,36 Q30,42 24,38 Q18,34 24,28 Q28,24 32,28" fill="none" stroke="#B44FFF" stroke-width="2" stroke-linecap="round"/>
    <!-- Small circles at triangle vertices -->
    <circle cx="32" cy="6" r="2" fill="#B44FFF"/>
    <circle cx="56" cy="54" r="2" fill="#B44FFF"/>
    <circle cx="8" cy="54" r="2" fill="#B44FFF"/>
  </g>
</svg>