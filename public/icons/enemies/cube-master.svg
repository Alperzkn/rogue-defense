<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Outer diamond (rotated square) -->
    <polygon points="32,6 58,32 32,58 6,32" fill="none" stroke="#FF8C00" stroke-width="3" stroke-linejoin="round"/>
    <!-- Inner diamond -->
    <polygon points="32,18 46,32 32,46 18,32" fill="none" stroke="#FF8C00" stroke-width="2" stroke-linejoin="round"/>
    <!-- Inner glow dot -->
    <polygon points="32,26 38,32 32,38 26,32" fill="#FF8C00" opacity="0.4"/>
  </g>
</svg>